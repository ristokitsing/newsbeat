name: newsbeat-digest

services:
  # Short-lived Python backend processor. It exits after publishing a digest.
  newsbeat-digest:
    build:
      context: .
    image: newsbeat-digest:local
    env_file:
      - .env
    environment:
      AI_DIGEST_DATABASE_PATH: /data/digest.db
    user: "${NEWSBEAT_DIGEST_UID:-1000}:${NEWSBEAT_DIGEST_GID:-1000}"
    volumes:
      - ./data:/data
      - ./feed:/app/feed
      - ./digests:/app/digests
    mem_limit: 384m
    cpus: 0.5
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp:size=16m
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    restart: "no"

  # Static delivery for backend-generated files; this is not an application API.
  # Unprivileged nginx image: no root master, listens on 8080, writes pid and
  # temp files under /tmp (see deploy/nginx.conf).
  static-feed:
    image: nginxinc/nginx-unprivileged:1.29-alpine
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - ./feed:/usr/share/nginx/html/feed:ro
      - ./digests:/usr/share/nginx/html/digests:ro
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    mem_limit: 48m
    cpus: 0.10
    pids_limit: 32
    read_only: true
    tmpfs:
      - /tmp:size=16m
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped
