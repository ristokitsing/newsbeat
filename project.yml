# Native app targets only. The Python/Docker backend is a separate repository.
name: Newsbeat
options:
  bundleIdPrefix: ee.risto.newsbeat
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES

targets:
  NewsbeatMac:
    type: application
    platform: macOS
    sources:
      - path: src/shared
      - path: src/macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.risto.newsbeat.macOS
        PRODUCT_NAME: NewsbeatMac
        PRODUCT_MODULE_NAME: NewsbeatMac
        ENABLE_APP_SANDBOX: NO
        CODE_SIGNING_ALLOWED: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    info:
      path: generated/NewsbeatMac-Info.plist
      properties:
        CFBundleDisplayName: newsbeat
        LSApplicationCategoryType: public.app-category.news

  NewsbeatIOS:
    type: application
    platform: iOS
    sources:
      - path: src/shared
      - path: src/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.risto.newsbeat.iOS
        PRODUCT_NAME: NewsbeatIOS
        PRODUCT_MODULE_NAME: NewsbeatIOS
        CODE_SIGNING_ALLOWED: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    info:
      path: generated/NewsbeatIOS-Info.plist
      properties:
        CFBundleDisplayName: newsbeat
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  NewsbeatMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tests/macOS
    dependencies:
      - target: NewsbeatMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.risto.newsbeat.macOSTests
        CODE_SIGNING_ALLOWED: NO

schemes:
  NewsbeatMac:
    build:
      targets:
        NewsbeatMac: all
        NewsbeatMacTests: [test]
    test:
      targets:
        - NewsbeatMacTests
  NewsbeatIOS:
    build:
      targets:
        NewsbeatIOS: all
